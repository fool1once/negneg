<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CIEL ON TOP — EXACT Lava Lamp Liquid (Green Left / Red Right)</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #000000;
      position: relative;
    }

    /* ============================================ */
    /* EXACT LAVA LAMP LIQUID BACKGROUND            */
    /* Dark background + glowing liquid blobs       */
    /* Green on LEFT, Red/Pink on RIGHT             */
    /* Smooth, realistic, organic shapes            */
    /* Like the screenshot you provided             */
    /* ============================================ */
    .lamp-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #010002;
      overflow: hidden;
      z-index: 0;
    }

    /* LAVA BLOBS - realistic organic fluid shapes */
    .lava {
      position: absolute;
      filter: blur(38px) contrast(1.5);
      animation: flowLiquid 15s infinite alternate ease-in-out;
      will-change: transform, border-radius;
    }

    /* === GREEN BLOB - LEFT SIDE (large, glowing, like in screenshot) === */
    .green-lava {
      width: 480px;
      height: 480px;
      background: radial-gradient(ellipse at 35% 45%, #33ff77, #00aa33, #005511);
      left: -100px;
      top: 20%;
      animation-duration: 17s;
      animation-delay: 0s;
      opacity: 0.92;
      box-shadow: 0 0 50px rgba(51, 255, 119, 0.4);
    }

    /* Second green blob (smaller, for depth) */
    .green-lava-2 {
      width: 320px;
      height: 320px;
      background: radial-gradient(ellipse at 40% 50%, #44ff88, #11cc44, #006622);
      left: 5%;
      bottom: 15%;
      animation-duration: 19s;
      animation-delay: -4s;
      opacity: 0.85;
    }

    /* === RED/PINK BLOB - RIGHT SIDE (faded, like in screenshot) === */
    .red-lava {
      width: 450px;
      height: 450px;
      background: radial-gradient(ellipse at 65% 50%, #ff4488, #cc1155, #770033);
      right: -80px;
      top: 25%;
      animation-duration: 18s;
      animation-delay: -2s;
      opacity: 0.88;
      box-shadow: 0 0 45px rgba(255, 68, 136, 0.35);
    }

    /* Second red blob */
    .red-lava-2 {
      width: 340px;
      height: 340px;
      background: radial-gradient(ellipse at 60% 55%, #ff6699, #dd2277, #990055);
      right: 10%;
      bottom: 20%;
      animation-duration: 20s;
      animation-delay: -6s;
      opacity: 0.8;
    }

    /* === TRANSITIONAL AMBER/ORANGE (between green and red) === */
    .amber-lava {
      width: 280px;
      height: 280px;
      background: radial-gradient(ellipse at 50% 50%, #ffaa44, #dd7722, #884411);
      left: 38%;
      top: 55%;
      animation-duration: 16s;
      animation-delay: -8s;
      opacity: 0.7;
    }

    /* Small magenta accent */
    .magenta-lava {
      width: 220px;
      height: 220px;
      background: radial-gradient(ellipse at 50% 50%, #ff66cc, #cc2299, #660055);
      right: 28%;
      top: 60%;
      animation-duration: 14s;
      animation-delay: -3s;
      opacity: 0.65;
    }

    /* Organic liquid morphing animation - makes it look like REAL lava lamp */
    @keyframes flowLiquid {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        border-radius: 48% 52% 42% 58% / 52% 48% 52% 48%;
      }
      20% {
        transform: translate(25px, -20px) scale(1.05) rotate(4deg);
        border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%;
      }
      40% {
        transform: translate(-18px, 30px) scale(0.95) rotate(-3deg);
        border-radius: 62% 38% 35% 65% / 55% 50% 50% 45%;
      }
      60% {
        transform: translate(35px, 15px) scale(1.04) rotate(7deg);
        border-radius: 38% 62% 65% 35% / 45% 60% 40% 55%;
      }
      80% {
        transform: translate(-22px, -18px) scale(0.97) rotate(-5deg);
        border-radius: 52% 48% 45% 55% / 60% 40% 60% 40%;
      }
      100% {
        transform: translate(18px, 25px) scale(1.02) rotate(2deg);
        border-radius: 45% 55% 40% 60% / 50% 45% 55% 50%;
      }
    }

    /* Liquid tendrils - realistic stretching (like real lava lamp) */
    .tendril {
      position: absolute;
      filter: blur(38px) contrast(1.4);
      animation: stretchFlow 22s infinite alternate;
    }

    .tendril-green {
      width: 250px;
      height: 500px;
      background: linear-gradient(180deg, #33ff77, #00aa33, #005511);
      left: -20px;
      top: -60px;
      border-radius: 45% 55% 35% 65% / 55% 45% 55% 45%;
      opacity: 0.7;
    }

    .tendril-red {
      width: 230px;
      height: 480px;
      background: linear-gradient(0deg, #ff4488, #cc1155, #770033);
      right: -10px;
      bottom: -50px;
      border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%;
      opacity: 0.65;
    }

    @keyframes stretchFlow {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      50% {
        transform: translate(20px, -30px) rotate(6deg) scale(1.06);
      }
      100% {
        transform: translate(-15px, 25px) rotate(-4deg) scale(0.95);
      }
    }

    /* Floating bubbles for extra realism */
    .bubble {
      position: absolute;
      filter: blur(22px);
      animation: rise 13s infinite alternate;
    }

    .bubble-g {
      width: 80px;
      height: 80px;
      background: #55ff99;
      left: 15%;
      top: 70%;
      opacity: 0.45;
    }
    .bubble-r {
      width: 70px;
      height: 70px;
      background: #ff6699;
      right: 22%;
      top: 60%;
      opacity: 0.4;
      animation-duration: 11s;
      animation-delay: -3s;
    }
    .bubble-g2 {
      width: 60px;
      height: 60px;
      background: #88ff66;
      left: 25%;
      top: 80%;
      opacity: 0.4;
      animation-duration: 10s;
      animation-delay: -5s;
    }
    .bubble-r2 {
      width: 65px;
      height: 65px;
      background: #ff88aa;
      right: 35%;
      top: 45%;
      opacity: 0.38;
      animation-duration: 12s;
      animation-delay: -2s;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0.25;
      }
      100% {
        transform: translateY(-50px) scale(1.1);
        opacity: 0.55;
      }
    }

    /* Very subtle dark vignette - keeps edges dark but doesn't hide liquid */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Subtle scanlines for texture */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Main text container - pure white */
    .container {
      position: relative;
      z-index: 20;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      pointer-events: none;
    }

    /* PURE WHITE TEXT - no color, just white */
    .glitch-text {
      position: relative;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      font-weight: 400;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 12px;
      text-shadow: 
        0 0 20px rgba(255, 255, 255, 0.9),
        0 0 40px rgba(255, 255, 255, 0.5),
        0 0 60px rgba(255, 255, 255, 0.2);
      animation: textGlitch 0.3s infinite;
      white-space: nowrap;
      padding: 0 20px;
      background: transparent;
    }

    /* Glitch layers - pure white only */
    .glitch-text::before,
    .glitch-text::after {
      content: "CIEL ON TOP";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: #ffffff;
      background: transparent;
    }

    .glitch-text::before {
      left: 2px;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      opacity: 0.55;
      transform: translateX(-1px);
      animation: glitch1 0.28s infinite alternate;
    }

    .glitch-text::after {
      left: -2px;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      opacity: 0.55;
      transform: translateX(1px);
      animation: glitch2 0.25s infinite alternate;
    }

    @keyframes textGlitch {
      0%, 90%, 100% { transform: translate(0, 0); }
      92% { transform: translate(-1.5px, 0.8px); }
      94% { transform: translate(1.5px, -0.5px); }
      96% { transform: translate(-0.8px, 0.4px); }
      98% { transform: translate(0.8px, -0.3px); }
    }

    @keyframes glitch1 {
      0% { transform: translateX(-1px); opacity: 0.5; }
      100% { transform: translateX(2.5px); opacity: 0.7; }
    }

    @keyframes glitch2 {
      0% { transform: translateX(1px); opacity: 0.5; }
      100% { transform: translateX(-2.5px); opacity: 0.7; }
    }

    /* Glitch bars - pure white */
    .glitch-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.85);
      opacity: 0;
      z-index: 25;
      pointer-events: none;
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
      animation: barFlash 2.6s infinite;
    }

    .glitch-bar:nth-child(1) { top: 18%; animation-delay: 0.3s; }
    .glitch-bar:nth-child(2) { top: 42%; animation-delay: 1.2s; }
    .glitch-bar:nth-child(3) { top: 63%; animation-delay: 0.8s; }
    .glitch-bar:nth-child(4) { top: 82%; animation-delay: 1.9s; }
    .glitch-bar:nth-child(5) { top: 30%; animation-delay: 0.5s; height: 1px; }
    .glitch-bar:nth-child(6) { top: 75%; animation-delay: 2.2s; }

    @keyframes barFlash {
      0%, 94%, 100% { opacity: 0; transform: translateX(-100%); }
      95% { opacity: 0.85; transform: translateX(0); }
      96.5% { opacity: 0; transform: translateX(100%); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .glitch-text {
        font-size: 14vw;
        letter-spacing: 6px;
        white-space: normal;
        word-break: keep-all;
        line-height: 1.2;
      }
      .glitch-text::before,
      .glitch-text::after {
        font-size: 14vw;
        letter-spacing: 6px;
      }
      .green-lava, .red-lava {
        width: 350px;
        height: 350px;
      }
    }
  </style>
</head>
<body>

  <!-- EXACT LAVA LAMP BACKGROUND - like your screenshot -->
  <div class="lamp-bg">
    <!-- GREEN BLOBS (LEFT) - large, glowing -->
    <div class="lava green-lava"></div>
    <div class="lava green-lava-2"></div>
    
    <!-- RED/PINK BLOBS (RIGHT) - faded, realistic -->
    <div class="lava red-lava"></div>
    <div class="lava red-lava-2"></div>
    
    <!-- Transitional amber blob -->
    <div class="lava amber-lava"></div>
    
    <!-- Magenta accent -->
    <div class="lava magenta-lava"></div>
    
    <!-- Liquid tendrils for realistic stretching -->
    <div class="tendril tendril-green"></div>
    <div class="tendril tendril-red"></div>
    
    <!-- Floating bubbles -->
    <div class="bubble bubble-g"></div>
    <div class="bubble bubble-r"></div>
    <div class="bubble bubble-g2"></div>
    <div class="bubble bubble-r2"></div>
  </div>

  <!-- Subtle overlays - keeps edges dark without hiding liquid -->
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <!-- Glitch bars -->
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>

  <!-- Pure white text -->
  <div class="container">
    <div class="glitch-text">CIEL ON TOP</div>
  </div>

</body>
</html>
