<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SERVANDO ON TOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #050505;
      position: relative;
    }

    /* ============================================ */
    /* REALISTIC LAVA LAMP / LIQUID BLOB BG         */
    /* Green on left, red/faded pink, deep dark     */
    /* Smooth organic flowing shapes (not circles)  */
    /* ============================================ */
    .lava-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020205;
      overflow: hidden;
      z-index: 0;
    }

    /* Organic fluid shapes using SVG-like blobs with complex paths */
    /* Each blob uses irregular, organic morphing */
    
    .organic-blob {
      position: absolute;
      filter: blur(45px) contrast(1.5);
      opacity: 0.85;
      animation: morphOrganic 14s infinite alternate ease-in-out;
      will-change: transform, border-radius, filter;
    }

    /* LEFT SIDE - GREEN LIQUID (faded, realistic) */
    .blob-green {
      width: 550px;
      height: 550px;
      background: radial-gradient(ellipse at 35% 45%, #00ff88, #008844, #004422);
      left: -150px;
      top: 20%;
      animation-duration: 16s;
      animation-delay: 0s;
      box-shadow: 0 0 100px rgba(0, 255, 136, 0.3);
    }

    /* RIGHT/BOTTOM - RED/FADED PINK LIQUID */
    .blob-red {
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse at 65% 55%, #ff3366, #cc1155, #660033);
      right: -120px;
      bottom: 10%;
      animation-duration: 18s;
      animation-delay: -4s;
      box-shadow: 0 0 90px rgba(255, 51, 102, 0.35);
    }

    /* Middle - fading pink/magenta blob */
    .blob-magenta {
      width: 450px;
      height: 450px;
      background: radial-gradient(ellipse at 50% 50%, #ff66aa, #cc3388, #551133);
      left: 30%;
      top: 45%;
      animation-duration: 20s;
      animation-delay: -7s;
      opacity: 0.7;
      box-shadow: 0 0 80px rgba(255, 102, 170, 0.3);
    }

    /* Another green accent blob (faded, deeper) */
    .blob-green-deep {
      width: 420px;
      height: 420px;
      background: radial-gradient(ellipse at 40% 60%, #22dd66, #006633, #002211);
      left: 5%;
      bottom: 15%;
      animation-duration: 19s;
      animation-delay: -2s;
      opacity: 0.75;
    }

    /* Faded orange/amber transition blob */
    .blob-amber {
      width: 380px;
      height: 380px;
      background: radial-gradient(ellipse at 55% 40%, #ff8844, #aa4411, #441100);
      right: 15%;
      top: 30%;
      animation-duration: 17s;
      animation-delay: -9s;
      opacity: 0.6;
    }

    /* Deep purple-red accent (faded) */
    .blob-purple {
      width: 470px;
      height: 470px;
      background: radial-gradient(ellipse at 50% 50%, #aa44cc, #551177, #220044);
      left: 40%;
      bottom: -10%;
      animation-duration: 22s;
      animation-delay: -5s;
      opacity: 0.65;
    }

    /* Additional floating organic "tendrils" - realistic liquid stretching */
    .liquid-tendril {
      position: absolute;
      filter: blur(50px) contrast(1.4);
      opacity: 0.55;
      animation: tendrilFlow 21s infinite alternate;
    }

    .tendril-1 {
      width: 300px;
      height: 600px;
      background: linear-gradient(180deg, #00ff88, #008844, #004422);
      left: -50px;
      top: -100px;
      border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      animation-duration: 24s;
    }

    .tendril-2 {
      width: 280px;
      height: 550px;
      background: linear-gradient(0deg, #ff3366, #cc1155, #660033);
      right: -30px;
      bottom: -80px;
      border-radius: 55% 45% 65% 35% / 40% 55% 45% 60%;
      animation-duration: 26s;
      animation-delay: -6s;
    }

    .tendril-3 {
      width: 250px;
      height: 500px;
      background: linear-gradient(135deg, #ff66aa, #cc3388);
      left: 20%;
      top: -50px;
      border-radius: 60% 40% 35% 65% / 55% 45% 55% 45%;
      animation-duration: 19s;
      animation-delay: -3s;
      opacity: 0.45;
    }

    /* Organic morphing animation - makes it look like REAL thick liquid */
    @keyframes morphOrganic {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        border-radius: 45% 55% 40% 60% / 50% 45% 55% 50%;
        filter: blur(45px) contrast(1.5);
      }
      20% {
        transform: translate(25px, -20px) scale(1.05) rotate(4deg);
        border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%;
      }
      40% {
        transform: translate(-15px, 30px) scale(0.96) rotate(-3deg);
        border-radius: 60% 40% 35% 65% / 55% 50% 50% 45%;
      }
      60% {
        transform: translate(35px, 15px) scale(1.03) rotate(7deg);
        border-radius: 40% 60% 65% 35% / 45% 60% 40% 55%;
      }
      80% {
        transform: translate(-20px, -15px) scale(0.98) rotate(-5deg);
        border-radius: 50% 50% 45% 55% / 60% 40% 60% 40%;
      }
      100% {
        transform: translate(15px, 25px) scale(1.02) rotate(2deg);
        border-radius: 48% 52% 42% 58% / 52% 48% 52% 48%;
      }
    }

    @keyframes tendrilFlow {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      }
      33% {
        transform: translate(30px, -40px) rotate(8deg) scale(1.06);
        border-radius: 55% 45% 65% 35% / 40% 55% 45% 60%;
      }
      66% {
        transform: translate(-25px, 35px) rotate(-6deg) scale(0.94);
        border-radius: 35% 65% 45% 55% / 60% 50% 50% 40%;
      }
      100% {
        transform: translate(20px, -15px) rotate(3deg) scale(1.02);
        border-radius: 48% 52% 38% 62% / 55% 45% 55% 45%;
      }
    }

    /* Extra floating "bubbles" for lava lamp realism */
    .fluid-bubble {
      position: absolute;
      filter: blur(25px);
      opacity: 0.4;
      animation: bubbleRise 12s infinite alternate;
    }

    .bubble-1 {
      width: 120px;
      height: 120px;
      background: #00ffaa;
      left: 15%;
      top: 70%;
      animation-duration: 14s;
    }
    .bubble-2 {
      width: 90px;
      height: 90px;
      background: #ff4488;
      right: 25%;
      top: 60%;
      animation-duration: 11s;
      animation-delay: -3s;
    }
    .bubble-3 {
      width: 140px;
      height: 140px;
      background: #88ff44;
      left: 45%;
      top: 80%;
      animation-duration: 16s;
      animation-delay: -7s;
    }
    .bubble-4 {
      width: 70px;
      height: 70px;
      background: #ff8844;
      right: 10%;
      top: 40%;
      animation-duration: 9s;
      animation-delay: -2s;
    }
    .bubble-5 {
      width: 100px;
      height: 100px;
      background: #aa44ff;
      left: 65%;
      top: 75%;
      animation-duration: 13s;
      animation-delay: -5s;
    }

    @keyframes bubbleRise {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0.2;
      }
      100% {
        transform: translateY(-80px) scale(1.2);
        opacity: 0.55;
      }
    }

    /* Deep dark gradient overlay to keep realistic depth */
    .depth-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Subtle vignette for realism */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.7) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Light scanlines - very subtle */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Main text container - pure white */
    .container {
      position: relative;
      z-index: 20;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      pointer-events: none;
    }

    /* PURE WHITE TEXT - exactly as requested */
    .glitch-text {
      position: relative;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      font-weight: 400;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 12px;
      text-shadow: 
        0 0 15px rgba(255, 255, 255, 0.9),
        0 0 30px rgba(255, 255, 255, 0.5),
        0 0 50px rgba(255, 255, 255, 0.2);
      animation: subtleGlitch 0.3s infinite;
      white-space: nowrap;
      padding: 0 20px;
      background: transparent;
    }

    /* Glitch layers - pure white only, no colors */
    .glitch-text::before,
    .glitch-text::after {
      content: "SERVANDO";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: #ffffff;
      background: transparent;
    }

    .glitch-text::before {
      left: 2px;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      opacity: 0.55;
      transform: translateX(-1px);
      animation: glitchShift1 0.28s infinite alternate;
    }

    .glitch-text::after {
      left: -2px;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      opacity: 0.55;
      transform: translateX(1px);
      animation: glitchShift2 0.25s infinite alternate;
    }

    @keyframes subtleGlitch {
      0%, 90%, 100% { transform: translate(0, 0); }
      92% { transform: translate(-1.5px, 0.8px); }
      94% { transform: translate(1.5px, -0.5px); }
      96% { transform: translate(-0.8px, 0.4px); }
      98% { transform: translate(0.8px, -0.3px); }
    }

    @keyframes glitchShift1 {
      0% { transform: translateX(-1px); opacity: 0.5; }
      100% { transform: translateX(2.5px); opacity: 0.7; }
    }

    @keyframes glitchShift2 {
      0% { transform: translateX(1px); opacity: 0.5; }
      100% { transform: translateX(-2.5px); opacity: 0.7; }
    }

    /* Horizontal glitch bars - pure white */
    .glitch-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.9);
      opacity: 0;
      z-index: 25;
      pointer-events: none;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
      animation: barGlitch 2.6s infinite;
    }

    .glitch-bar:nth-child(1) { top: 18%; animation-delay: 0.3s; }
    .glitch-bar:nth-child(2) { top: 42%; animation-delay: 1.2s; }
    .glitch-bar:nth-child(3) { top: 63%; animation-delay: 0.8s; }
    .glitch-bar:nth-child(4) { top: 82%; animation-delay: 1.9s; }
    .glitch-bar:nth-child(5) { top: 30%; animation-delay: 0.5s; height: 1px; }
    .glitch-bar:nth-child(6) { top: 75%; animation-delay: 2.2s; }

    @keyframes barGlitch {
      0%, 94%, 100% { opacity: 0; transform: translateX(-100%); }
      95% { opacity: 0.85; transform: translateX(0); }
      96.5% { opacity: 0; transform: translateX(100%); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .glitch-text {
        font-size: 14vw;
        letter-spacing: 6px;
        white-space: normal;
        word-break: keep-all;
        line-height: 1.2;
      }
      .glitch-text::before,
      .glitch-text::after {
        font-size: 14vw;
        letter-spacing: 6px;
      }
      .blob-green, .blob-red, .blob-magenta {
        width: 350px;
        height: 350px;
      }
      .blob-green-deep, .blob-amber, .blob-purple {
        width: 300px;
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <!-- REALISTIC LAVA LAMP / ORGANIC LIQUID BACKGROUND -->
  <div class="lava-container">
    <!-- Main organic blobs (green left, red/faded pink right) -->
    <div class="organic-blob blob-green"></div>
    <div class="organic-blob blob-red"></div>
    <div class="organic-blob blob-magenta"></div>
    <div class="organic-blob blob-green-deep"></div>
    <div class="organic-blob blob-amber"></div>
    <div class="organic-blob blob-purple"></div>
    
    <!-- Liquid tendrils for realistic stretching effect -->
    <div class="liquid-tendril tendril-1"></div>
    <div class="liquid-tendril tendril-2"></div>
    <div class="liquid-tendril tendril-3"></div>
    
    <!-- Floating bubbles (lava lamp realism) -->
    <div class="fluid-bubble bubble-1"></div>
    <div class="fluid-bubble bubble-2"></div>
    <div class="fluid-bubble bubble-3"></div>
    <div class="fluid-bubble bubble-4"></div>
    <div class="fluid-bubble bubble-5"></div>
  </div>

  <!-- Depth and texture overlays -->
  <div class="depth-overlay"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <!-- Glitch bars -->
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>

  <!-- Pure white text -->
  <div class="container">
    <div class="glitch-text">SERVANDO</div>
  </div>

</body>
</html>
