<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL ON TOP</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;

      animation: bgSwitch 1s infinite;
    }

    /* DARKER FLASH COLORS */
    @keyframes bgSwitch {
      0%   { background: #000000; }
      20%  { background: #0a0a1a; }
      40%  { background: #001a1a; }
      60%  { background: #14001a; }
      80%  { background: #001400; }
      100% { background: #000000; }
    }

    /* SOFT BLUR LAYER */
    body::before {
      content: "";
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      z-index: 0;

      background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
      filter: blur(80px);
    }

    .title {
      font-family: 'Anton', sans-serif;
      font-size: 13vw; /* BIGGER */
      color: white;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

  </style>
</head>

<body>
  <div class="title">CIEL ON TOP</div>
</body>
</html>
