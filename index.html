<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Servando // CRT Glitch // minimalist</title>

  <!-- bold typography + industrial retro -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* immersive, raw feel */
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* =========================
       CINEMATIC VIDEO BACKGROUND + GRIT
    ========================= */
    .video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.25) saturate(1.15) brightness(0.75);
      transition: filter 0.05s linear;
    }

    /* dark vignette + CRT atmosphere */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.75) 100%);
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    /* authentic scanlines */
    .scanlines {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.2),
        rgba(0, 0, 0, 0.2) 1px,
        transparent 2px,
        transparent 4px
      );
      z-index: 2;
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 0.6;
    }

    /* grain texture */
    .grain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.05) 1.2px, transparent 1.2px);
      background-size: 6px 6px;
      background-repeat: repeat;
      pointer-events: none;
      z-index: 3;
      opacity: 0.5;
      mix-blend-mode: overlay;
      animation: subtleNoise 0.25s infinite;
    }

    /* CRT inner curvature */
    .crt-curve {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 45px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 4;
    }

    /* =========================
       GLITCH BARS (VHS TRACKING)
    ========================= */
    .bar {
      position: absolute;
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.9);
      opacity: 0;
      z-index: 6;
      filter: blur(0.6px);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: barGlitch 3.2s infinite cubic-bezier(0.8, 0, 0.2, 1);
    }

    .bar:nth-child(1) { top: 18%; animation-delay: 0.1s; height: 2px; background: #ffaa88; }
    .bar:nth-child(2) { top: 35%; animation-delay: 1.2s; height: 4px; background: #aaffff; opacity: 0.8; }
    .bar:nth-child(3) { top: 52%; animation-delay: 0.7s; height: 2px; background: #ffffff; }
    .bar:nth-child(4) { top: 68%; animation-delay: 2s; height: 3px; background: #ff66aa; }
    .bar:nth-child(5) { top: 84%; animation-delay: 0.4s; height: 2px; background: #ffffff; }
    .bar:nth-child(6) { top: 94%; animation-delay: 1.8s; height: 3px; background: #88ffcc; opacity: 0.6; }

    @keyframes barGlitch {
      0%, 92%, 100% { opacity: 0; transform: translateX(-100%); }
      94% { opacity: 0.9; transform: translateX(5%); }
      95% { opacity: 0.4; transform: translateX(15%); }
      96% { opacity: 1; transform: translateX(0%); }
      97% { opacity: 0; transform: translateX(80%); }
    }

    /* =========================
       MAIN TEXT BLOCK (minimalist alignment, tight spacing)
    ========================= */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 1.5rem;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ----- MAIN GLITCH TITLE (SERVANDO) ----- */
    .glitch-text {
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      color: white;
      letter-spacing: 12px;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(255,255,255,0.9),
        0 0 28px rgba(255,0,100,0.6),
        0 0 5px rgba(255,255,255,0.5);
      animation: textGlitchMove 0.22s infinite steps(1);
      position: relative;
      display: inline-block;
      transform-origin: center;
      margin-bottom: 0; /* tighter */
      line-height: 1.1;
    }

    /* RGB split layers */
    .glitch-text::before,
    .glitch-text::after {
      content: "SERVANDO";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: white;
      opacity: 0.65;
      background: transparent;
    }

    .glitch-text::before {
      transform: translate(3px, 1px);
      text-shadow: -3px 0 #ff3366;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      animation: rgbShiftBefore 0.3s infinite alternate;
    }

    .glitch-text::after {
      transform: translate(-3px, -1px);
      text-shadow: 3px 0 #33ccff;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      animation: rgbShiftAfter 0.25s infinite alternate;
    }

    /* ----- ONTOP SUBTITLE (smaller, minimal, solid color + glitch effects) ----- */
    .subtitle {
      font-family: 'Anton', sans-serif;
      font-size: 3.2vw;        /* smaller than before (was 4vw) */
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #ffffff;           /* solid white — no gradient color shift */
      text-shadow: 0 0 8px rgba(255, 80, 120, 0.7), 0 0 12px rgba(0, 180, 255, 0.3);
      margin-top: 0.05em;       /* very close to SERVANDO */
      margin-bottom: 0.25em;    /* reduced gap to names */
      position: relative;
      display: inline-block;
      animation: subtitleFlicker 3s infinite;
    }
    
    /* ghost glitch overlay (keeps effect) */
    .subtitle::before {
      content: "ONTOP";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: #ff88aa;
      opacity: 0;
      clip-path: polygon(0 30%, 100% 0%, 100% 70%, 0 100%);
      animation: subtitleGhost 2.2s infinite alternate;
    }

    /* ----- NAMES / COLLECTIVE (NO BLACK CIRCLE, completely minimal) ----- */
    .names-collective {
      margin-top: 0.4rem;       /* tighter */
      width: 100%;
      text-align: center;
    }

    .name-strip {
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #e6e6e6;
      text-transform: uppercase;
      background: transparent;   /* NO black background, no circle */
      backdrop-filter: none;
      padding: 0;                /* no pill padding */
      border-radius: 0;
      box-shadow: none;
      border: none;
      word-break: break-word;
      white-space: normal;
      max-width: 95vw;
      line-height: 1.5;
      transition: all 0.1s ease;
      text-shadow: 0 0 4px rgba(255,255,200,0.3);
    }

    /* simple inline spacing for names */
    .name-strip span {
      display: inline-block;
      margin: 0 0.1rem;
    }

    /* responsive: text scales nicely */
    @media (max-width: 700px) {
      .glitch-text {
        font-size: 15vw;
        letter-spacing: 5px;
      }
      .subtitle {
        font-size: 5vw;        /* smaller on mobile */
        letter-spacing: 2px;
      }
      .name-strip {
        font-size: 0.75rem;
      }
      .container {
        padding: 0 1rem;
      }
    }

    @media (max-width: 480px) {
      .name-strip {
        font-size: 0.65rem;
        line-height: 1.4;
      }
      .glitch-text {
        letter-spacing: 3px;
      }
      .subtitle {
        font-size: 6vw;
      }
    }

    /* =========================
       GLITCH KEYFRAMES (TEXT & RGB)
    ========================= */
    @keyframes textGlitchMove {
      0%, 88%, 100% { transform: translate(0, 0); }
      90% { transform: translate(-1.5px, 1px); }
      92% { transform: translate(2px, -1.5px); }
      94% { transform: translate(-2px, 1.2px); }
      96% { transform: translate(1px, -1px); }
      98% { transform: translate(-1px, 0.8px); }
    }

    @keyframes rgbShiftBefore {
      0% { transform: translate(2px, 0); clip-path: polygon(0 0, 100% 0, 100% 42%, 0 42%); }
      100% { transform: translate(4px, 1px); clip-path: polygon(0 0, 100% 0, 100% 48%, 0 48%); }
    }

    @keyframes rgbShiftAfter {
      0% { transform: translate(-2px, 0); clip-path: polygon(0 58%, 100% 58%, 100% 100%, 0 100%); }
      100% { transform: translate(-4px, 1px); clip-path: polygon(0 52%, 100% 52%, 100% 100%, 0 100%); }
    }

    @keyframes subtitleGhost {
      0% { opacity: 0; transform: translateX(-2px); }
      100% { opacity: 0.6; transform: translateX(3px); text-shadow: -2px 0 #ff3366; }
    }

    @keyframes subtitleFlicker {
      0%, 80%, 100% { opacity: 1; }
      84% { opacity: 0.7; }
      86% { opacity: 1; }
      92% { opacity: 0.9; letter-spacing: 4px; }
    }

    /* =========================
       CRT ATMOSPHERE LAYERS
    ========================= */
    .flicker-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.04);
      pointer-events: none;
      z-index: 5;
      animation: crtFlicker 0.2s infinite;
      mix-blend-mode: screen;
    }

    @keyframes crtFlicker {
      0%, 90%, 100% { opacity: 0; }
      93% { opacity: 0.12; }
      95% { opacity: 0.06; }
      97% { opacity: 0.15; }
    }

    .extra-interference {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(90deg, 
        rgba(255,255,255,0) 0px,
        rgba(255,0,80,0.08) 2px,
        rgba(255,255,255,0) 6px,
        rgba(0,200,255,0.06) 10px,
        transparent 14px);
      z-index: 7;
      pointer-events: none;
      opacity: 0.4;
      mix-blend-mode: overlay;
      animation: hScanlineMove 6s linear infinite;
    }

    @keyframes hScanlineMove {
      0% { background-position: 0 0; }
      100% { background-position: 80px 0; }
    }

    .vhs-pulse {
      position: absolute;
      inset: 0;
      box-shadow: 0 0 25px rgba(255, 0, 80, 0.2) inset;
      pointer-events: none;
      z-index: 12;
      animation: edgePulse 4s infinite;
    }

    @keyframes edgePulse {
      0% { box-shadow: 0 0 15px rgba(255, 0, 80, 0.1) inset; }
      50% { box-shadow: 0 0 30px rgba(255, 60, 120, 0.25) inset; }
      100% { box-shadow: 0 0 15px rgba(255, 0, 80, 0.1) inset; }
    }

    /* =========================
       HEAVY GLITCH EXTENSION (affects all text but keeps minimal styling)
    ========================= */
    .global-glitch {
      animation: heavyCrashGlitch 0.12s cubic-bezier(0.2, 0.9, 0.8, 0.1) forwards !important;
    }

    .global-glitch .video-bg video {
      filter: contrast(1.8) saturate(2) hue-rotate(8deg) brightness(0.6) !important;
    }

    .global-glitch .glitch-text {
      animation: none;
      transform: skewX(3deg) translateY(3px);
      filter: blur(0.8px);
    }

    .global-glitch .subtitle {
      transform: skewX(2deg) translateX(4px);
      filter: blur(0.6px);
      letter-spacing: 0px;
    }

    .global-glitch .name-strip {
      transform: skewX(-1.2deg) translateX(-2px);
      filter: blur(0.3px);
    }

    .global-glitch .glitch-text::before,
    .global-glitch .glitch-text::after {
      opacity: 0.9;
      filter: blur(1px);
    }

    @keyframes heavyCrashGlitch {
      0% { transform: translate(0, 0); filter: contrast(1) saturate(1); }
      20% { transform: translate(8px, -4px) skewX(4deg); filter: contrast(1.6) saturate(1.8) hue-rotate(12deg); }
      40% { transform: translate(-10px, 5px) skewX(-3deg); filter: contrast(1.9) saturate(2.2) hue-rotate(-8deg); }
      60% { transform: translate(6px, -2px) skewX(2deg); filter: contrast(1.2) saturate(1.4) hue-rotate(5deg); }
      80% { transform: translate(-4px, 3px) skewX(-2deg); filter: contrast(1.5) saturate(1.6) brightness(1.2); }
      100% { transform: translate(0, 0); filter: contrast(1) saturate(1); }
    }

    .glitch-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,240,200,0.5) 0%, rgba(0,255,255,0.2) 100%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.02s linear;
    }
  </style>
</head>
<body>

  <!-- LAVA / CINEMATIC BACKGROUND -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="lava.mp4" type="video/mp4">
      <!-- fallback: black background -->
    </video>
  </div>

  <!-- CRT LAYERS: analog soul -->
  <div class="overlay"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>
  <div class="crt-curve"></div>
  <div class="flicker-overlay"></div>
  <div class="extra-interference"></div>
  <div class="vhs-pulse"></div>

  <!-- GLITCH BARS (tracking lines) -->
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>

  <!-- FLASH for heavy glitch -->
  <div class="glitch-flash" id="glitchFlash"></div>

  <!-- MAIN TEXT GROUP: minimalist tight alignment, no background circles -->
  <div class="container">
    <!-- primary glitch name -->
    <div class="glitch-text">SERVANDO</div>
    
    <!-- ONTOP smaller, solid color + glitch preservation -->
    <div class="subtitle">ONTOP</div>
    
    <!-- Collective names: NO BLACK CIRCLE, pure minimal typography -->
    <div class="names-collective">
      <div class="name-strip" id="nameList"></div>
    </div>
  </div>

  <script>
    (function() {
      // ========================
      // NAME LIST: perfectly aligned, comma separated, no background
      // ========================
      const rawNames = "EYB, AERI, KELL, CIEL, SHANE, YHELL, ZENFLO, CHI, TATI, YE, MARY";
      const nameContainer = document.getElementById('nameList');
      if (nameContainer) {
        const namesArray = rawNames.split(',').map(n => n.trim());
        nameContainer.innerHTML = '';
        namesArray.forEach((name, idx) => {
          const nameSpan = document.createElement('span');
          nameSpan.textContent = name;
          nameSpan.style.display = 'inline-block';
          nameSpan.style.margin = '0 0.15rem';
          nameSpan.style.fontWeight = '600';
          nameContainer.appendChild(nameSpan);
          if (idx < namesArray.length - 1) {
            const commaSpan = document.createElement('span');
            commaSpan.textContent = ', ';
            commaSpan.style.display = 'inline-block';
            commaSpan.style.marginRight = '0.1rem';
            commaSpan.style.opacity = '0.85';
            nameContainer.appendChild(commaSpan);
          }
        });
      }

      // --- OLD TV HEAVY GLITCH ENGINE (preserves immersion) ---
      const bodyEl = document.body;
      const flashEl = document.getElementById('glitchFlash');
      
      function triggerHeavyGlitch() {
        bodyEl.classList.add('global-glitch');
        if (flashEl) {
          flashEl.style.opacity = '0.65';
          setTimeout(() => {
            if (flashEl) flashEl.style.opacity = '0';
          }, 55);
        }
        setTimeout(() => {
          bodyEl.classList.remove('global-glitch');
        }, 130);
      }
      
      let glitchTimeout;
      function scheduleGlitch() {
        const minDelay = 2800;
        const maxDelay = 8200;
        const nextGlitchIn = Math.floor(Math.random() * (maxDelay - minDelay + 1) + minDelay);
        glitchTimeout = setTimeout(() => {
          triggerHeavyGlitch();
          scheduleGlitch();
        }, nextGlitchIn);
      }
      
      // subtle interference (micro glitch)
      function subtleInterference() {
        if (Math.random() > 0.68) return;
        const tempOverlay = document.createElement('div');
        tempOverlay.style.position = 'absolute';
        tempOverlay.style.top = '0';
        tempOverlay.style.left = '0';
        tempOverlay.style.width = '100%';
        tempOverlay.style.height = '100%';
        tempOverlay.style.backgroundColor = 'rgba(255, 70, 120, 0.12)';
        tempOverlay.style.mixBlendMode = 'screen';
        tempOverlay.style.pointerEvents = 'none';
        tempOverlay.style.zIndex = '25';
        document.body.appendChild(tempOverlay);
        
        const textContainer = document.querySelector('.glitch-text');
        const subtitleEl = document.querySelector('.subtitle');
        if (textContainer) {
          textContainer.style.transform = 'skewX(1.2deg) translateX(2px)';
          setTimeout(() => {
            if (textContainer) textContainer.style.transform = '';
          }, 45);
        }
        if (subtitleEl) {
          subtitleEl.style.transform = 'skewX(0.8deg) translateX(-1px)';
          setTimeout(() => {
            if (subtitleEl) subtitleEl.style.transform = '';
          }, 40);
        }
        setTimeout(() => {
          if (tempOverlay && tempOverlay.remove) tempOverlay.remove();
        }, 50);
      }
      
      let microInterval;
      function startMicroGlitchRain() {
        microInterval = setInterval(() => {
          subtleInterference();
        }, 1900);
      }
      
      // random bar flash (extra tracking noise)
      function randomBarFlash() {
        const bars = document.querySelectorAll('.bar');
        if (bars.length) {
          const randomIndex = Math.floor(Math.random() * bars.length);
          const randomBar = bars[randomIndex];
          if (randomBar) {
            randomBar.style.animation = 'none';
            randomBar.style.opacity = '0.95';
            randomBar.style.transform = 'translateX(2%)';
            setTimeout(() => {
              if (randomBar) {
                randomBar.style.animation = '';
                randomBar.style.opacity = '';
                randomBar.style.transform = '';
              }
            }, 60);
          }
        }
      }
      
      let barInterval;
      function startBarDisruption() {
        barInterval = setInterval(() => {
          if (Math.random() > 0.6) {
            randomBarFlash();
          }
        }, 2300);
      }
      
      // scanline intensity modulation (vintage)
      function varyScanlineOpac() {
        const scan = document.querySelector('.scanlines');
        if (scan) {
          const newOp = 0.55 + Math.random() * 0.2;
          scan.style.opacity = newOp;
          setTimeout(() => {
            if (scan) scan.style.opacity = '0.6';
          }, 180);
        }
      }
      setInterval(() => {
        if (Math.random() > 0.8) varyScanlineOpac();
      }, 3200);
      
      const videoEl = document.querySelector('video');
      if (videoEl) {
        videoEl.play().catch(e => console.log('video autoplay blocked, visuals still work'));
      }
      
      scheduleGlitch();
      startMicroGlitchRain();
      startBarDisruption();
      
      // extra name strip subtle flicker (no background)
      function nameStripFlicker() {
        const nameStrip = document.querySelector('.name-strip');
        if (nameStrip && Math.random() > 0.8) {
          nameStrip.style.transform = 'translateX(1px)';
          nameStrip.style.opacity = '0.9';
          setTimeout(() => {
            if (nameStrip) {
              nameStrip.style.transform = '';
              nameStrip.style.opacity = '';
            }
          }, 30);
        }
      }
      setInterval(nameStripFlicker, 2400);
      
      // text shadow micro-glitch for SERVANDO (maintains effect)
      function textShadowFlicker() {
        const glitchElem = document.querySelector('.glitch-text');
        if (glitchElem && Math.random() > 0.75) {
          const r = Math.floor(Math.random() * 30);
          const g = Math.floor(Math.random() * 30);
          const b = Math.floor(Math.random() * 40);
          glitchElem.style.textShadow = `0 0 6px rgba(255,${100+r},${80+r},0.9), 0 0 18px rgba(${r},${g},255,0.7)`;
          setTimeout(() => {
            if (glitchElem) glitchElem.style.textShadow = '';
          }, 70);
        }
      }
      setInterval(textShadowFlicker, 1700);
      
      // video color bleeding
      function videoColorBleed() {
        if (videoEl && Math.random() > 0.85) {
          videoEl.style.filter = 'contrast(1.4) saturate(1.6) hue-rotate(3deg) brightness(0.7)';
          setTimeout(() => {
            if (videoEl) videoEl.style.filter = '';
          }, 90);
        }
      }
      setInterval(videoColorBleed, 2800);
      
      // responsiveness and safety
      const adjustFontIfNeeded = () => {
        const nameStrip = document.querySelector('.name-strip');
        if (nameStrip && nameStrip.scrollWidth > window.innerWidth - 40) {
          nameStrip.style.fontSize = '0.7rem';
        } else if (nameStrip) {
          nameStrip.style.fontSize = '';
        }
      };
      setTimeout(adjustFontIfNeeded, 100);
      window.addEventListener('resize', adjustFontIfNeeded);
      
      window.addEventListener('beforeunload', () => {
        if (glitchTimeout) clearTimeout(glitchTimeout);
        if (microInterval) clearInterval(microInterval);
        if (barInterval) clearInterval(barInterval);
      });
      
      console.log('🎧 minimalist CRT // SERVANDO | ONTOP | no black circles, tight spacing');
    })();
  </script>
</body>
</html>
