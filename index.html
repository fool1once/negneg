<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CIEL ON TOP — Neon Liquid Motion</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #000000;
      position: relative;
    }

    /* ============================================ */
    /* EXACT LIQUID / LAVA LAMP NEON BACKGROUND    */
    /* Deep dark background + floating liquid blobs */
    /* Like the YouTube video "3 AM - Baby Blood"  */
    /* ============================================ */
    .liquid-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
      z-index: 0;
    }

    /* Floating liquid blobs - lava lamp style */
    .lava-blob {
      position: absolute;
      border-radius: 45%;
      filter: blur(40px) contrast(1.6);
      opacity: 0.75;
      animation: floatLava 12s infinite alternate ease-in-out;
      will-change: transform, border-radius;
    }

    /* Neon cyan blob */
    .lava-blob:nth-child(1) {
      width: 450px;
      height: 450px;
      background: #00ffff;
      box-shadow: 0 0 80px rgba(0, 255, 255, 0.4);
      top: 10%;
      left: -100px;
      animation-duration: 14s;
      animation-delay: 0s;
    }

    /* Neon pink/magenta blob */
    .lava-blob:nth-child(2) {
      width: 380px;
      height: 380px;
      background: #ff00ff;
      box-shadow: 0 0 70px rgba(255, 0, 255, 0.4);
      bottom: 5%;
      right: -80px;
      animation-duration: 16s;
      animation-delay: -3s;
    }

    /* Neon yellow/orange blob */
    .lava-blob:nth-child(3) {
      width: 500px;
      height: 500px;
      background: #ffaa00;
      box-shadow: 0 0 90px rgba(255, 170, 0, 0.35);
      top: 40%;
      left: 30%;
      animation-duration: 18s;
      animation-delay: -7s;
    }

    /* Deep purple/blue blob */
    .lava-blob:nth-child(4) {
      width: 420px;
      height: 420px;
      background: #8a2be2;
      box-shadow: 0 0 75px rgba(138, 43, 226, 0.5);
      bottom: 20%;
      left: -50px;
      animation-duration: 15s;
      animation-delay: -5s;
    }

    /* Neon green blob */
    .lava-blob:nth-child(5) {
      width: 350px;
      height: 350px;
      background: #39ff14;
      box-shadow: 0 0 60px rgba(57, 255, 20, 0.4);
      top: 60%;
      right: 10%;
      animation-duration: 13s;
      animation-delay: -2s;
    }

    /* Hot pink/red blob */
    .lava-blob:nth-child(6) {
      width: 400px;
      height: 400px;
      background: #ff1493;
      box-shadow: 0 0 80px rgba(255, 20, 147, 0.45);
      top: -80px;
      right: 20%;
      animation-duration: 17s;
      animation-delay: -10s;
    }

    /* Electric blue blob */
    .lava-blob:nth-child(7) {
      width: 320px;
      height: 320px;
      background: #0066ff;
      box-shadow: 0 0 70px rgba(0, 102, 255, 0.5);
      bottom: -50px;
      left: 40%;
      animation-duration: 19s;
      animation-delay: -1s;
    }

    /* Neon teal blob */
    .lava-blob:nth-child(8) {
      width: 370px;
      height: 370px;
      background: #00ffcc;
      box-shadow: 0 0 65px rgba(0, 255, 204, 0.4);
      top: 25%;
      right: 25%;
      animation-duration: 14.5s;
      animation-delay: -6s;
    }

    /* Lava lamp floating animation */
    @keyframes floatLava {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        border-radius: 45% 55% 40% 60% / 50% 45% 55% 50%;
      }
      25% {
        transform: translate(40px, -30px) scale(1.08) rotate(5deg);
        border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%;
      }
      50% {
        transform: translate(-30px, 40px) scale(0.92) rotate(-3deg);
        border-radius: 60% 40% 35% 65% / 55% 50% 50% 45%;
      }
      75% {
        transform: translate(25px, 25px) scale(1.04) rotate(8deg);
        border-radius: 40% 60% 65% 35% / 45% 60% 40% 55%;
      }
      100% {
        transform: translate(-15px, -20px) scale(0.97) rotate(-5deg);
        border-radius: 50% 50% 45% 55% / 60% 40% 60% 40%;
      }
    }

    /* Additional floating small "droplets" for lava lamp effect */
    .droplet {
      position: absolute;
      border-radius: 50%;
      filter: blur(25px);
      opacity: 0.5;
      animation: dropletFloat 8s infinite alternate;
    }

    .droplet:nth-child(1) {
      width: 120px;
      height: 120px;
      background: #ff66cc;
      top: 15%;
      left: 60%;
      animation-duration: 11s;
    }
    .droplet:nth-child(2) {
      width: 90px;
      height: 90px;
      background: #66ffcc;
      bottom: 30%;
      right: 20%;
      animation-duration: 9s;
      animation-delay: -2s;
    }
    .droplet:nth-child(3) {
      width: 150px;
      height: 150px;
      background: #ffaa44;
      top: 70%;
      left: 15%;
      animation-duration: 13s;
      animation-delay: -5s;
    }
    .droplet:nth-child(4) {
      width: 80px;
      height: 80px;
      background: #aa66ff;
      top: 45%;
      right: 40%;
      animation-duration: 7s;
      animation-delay: -1s;
    }

    @keyframes dropletFloat {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      100% { transform: translate(30px, -40px) scale(1.3); opacity: 0.6; }
    }

    /* Very subtle vignette to keep focus on liquid blobs (dark edges) */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Light scanlines for texture, doesn't wash out background */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Main text container - pure white, no color */
    .container {
      position: relative;
      z-index: 20;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      pointer-events: none;
    }

    /* PURE WHITE TEXT - exactly as requested, no color tints */
    .glitch-text {
      position: relative;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      font-weight: 400;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 12px;
      text-shadow: 
        0 0 10px rgba(255, 255, 255, 0.8),
        0 0 20px rgba(255, 255, 255, 0.5);
      animation: subtleGlitch 0.28s infinite;
      white-space: nowrap;
      padding: 0 20px;
      background: transparent;
    }

    /* Glitch layers - but pure white only, no red/cyan */
    .glitch-text::before,
    .glitch-text::after {
      content: "CIEL ON TOP";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: #ffffff;
      background: transparent;
    }

    .glitch-text::before {
      left: 2px;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      opacity: 0.6;
      transform: translateX(-1px);
      animation: glitchShift1 0.3s infinite alternate;
    }

    .glitch-text::after {
      left: -2px;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      opacity: 0.6;
      transform: translateX(1px);
      animation: glitchShift2 0.27s infinite alternate;
    }

    @keyframes subtleGlitch {
      0%, 90%, 100% { transform: translate(0, 0); }
      92% { transform: translate(-1px, 0.5px); }
      94% { transform: translate(1px, -0.3px); }
      96% { transform: translate(-0.5px, 0.2px); }
      98% { transform: translate(0.5px, -0.1px); }
    }

    @keyframes glitchShift1 {
      0% { transform: translateX(-1px); opacity: 0.5; }
      100% { transform: translateX(2px); opacity: 0.7; }
    }

    @keyframes glitchShift2 {
      0% { transform: translateX(1px); opacity: 0.5; }
      100% { transform: translateX(-2px); opacity: 0.7; }
    }

    /* Horizontal glitch bars - pure white */
    .glitch-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.85);
      opacity: 0;
      z-index: 25;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.6);
      animation: barGlitch 2.5s infinite;
    }

    .glitch-bar:nth-child(1) { top: 20%; animation-delay: 0.3s; }
    .glitch-bar:nth-child(2) { top: 45%; animation-delay: 1.1s; }
    .glitch-bar:nth-child(3) { top: 65%; animation-delay: 0.7s; }
    .glitch-bar:nth-child(4) { top: 80%; animation-delay: 1.8s; }
    .glitch-bar:nth-child(5) { top: 33%; animation-delay: 0.5s; height: 1px; }
    .glitch-bar:nth-child(6) { top: 72%; animation-delay: 2.0s; }

    @keyframes barGlitch {
      0%, 94%, 100% { opacity: 0; transform: translateX(-100%); }
      95% { opacity: 0.9; transform: translateX(0); }
      96.5% { opacity: 0; transform: translateX(100%); }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .glitch-text {
        font-size: 15vw;
        letter-spacing: 6px;
        white-space: normal;
        word-break: keep-all;
        line-height: 1.2;
      }
      .glitch-text::before,
      .glitch-text::after {
        font-size: 15vw;
        letter-spacing: 6px;
      }
      .lava-blob:nth-child(1) { width: 300px; height: 300px; }
      .lava-blob:nth-child(2) { width: 280px; height: 280px; }
      .lava-blob:nth-child(3) { width: 350px; height: 350px; }
      .lava-blob:nth-child(4) { width: 300px; height: 300px; }
      .lava-blob:nth-child(5) { width: 260px; height: 260px; }
      .lava-blob:nth-child(6) { width: 290px; height: 290px; }
      .lava-blob:nth-child(7) { width: 250px; height: 250px; }
      .lava-blob:nth-child(8) { width: 270px; height: 270px; }
    }
  </style>
</head>
<body>

  <!-- EXACT LIQUID LAVA LAMP BACKGROUND -->
  <div class="liquid-background">
    <!-- Main floating neon blobs (lava lamp style) -->
    <div class="lava-blob"></div>
    <div class="lava-blob"></div>
    <div class="lava-blob"></div>
    <div class="lava-blob"></div>
    <div class="lava-blob"></div>
    <div class="lava-blob"></div>
    <div class="lava-blob"></div>
    <div class="lava-blob"></div>
    
    <!-- Small droplets for extra fluid motion -->
    <div class="droplet"></div>
    <div class="droplet"></div>
    <div class="droplet"></div>
    <div class="droplet"></div>
  </div>

  <!-- Texture overlays (dark, doesn't ruin the lava lamp effect) -->
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <!-- Glitch bars -->
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>

  <!-- Pure white text container -->
  <div class="container">
    <div class="glitch-text">CIEL ON TOP</div>
  </div>

</body>
</html>
