<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute UI Popup</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
}

/* Container */
.container {
    text-align: center;
}

/* Cute Button */
.btn {
    padding: 15px 35px;
    font-size: 18px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #333;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.btn:hover {
    transform: translateY(-3px) scale(1.05);
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

/* Popup Background */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(6px);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

/* Active */
.popup.active {
    opacity: 1;
    visibility: visible;
}

/* Popup Card */
.popup-content {
    background: white;
    padding: 30px 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    transform: scale(0.8);
    transition: 0.3s;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.popup.active .popup-content {
    transform: scale(1);
}

/* Title */
.popup-content h2 {
    color: #ff758c;
    margin-bottom: 10px;
}

/* Text */
.popup-content p {
    color: #555;
    margin-bottom: 20px;
}

/* Close Button */
.close-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #a18cd1, #fbc2eb);
    color: #333;
    cursor: pointer;
    transition: 0.3s;
}

.close-btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
}

/* Mobile */
@media (max-width: 480px) {
    .btn {
        font-size: 16px;
        padding: 12px 25px;
    }
}
</style>

</head>
<body>

<div class="container">
    <button class="btn" onclick="openPopup()">I-klik ko</button>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="popupTitle">Hi there ✨</h2>
        <p id="popupMessage">This is your cute and professional popup!</p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").classList.add("active");

    // ✨ Customize here
    document.getElementById("popupTitle").innerText = "Bisaya Nigs";
    document.getElementById("popupMessage").innerText = "By fool";
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
