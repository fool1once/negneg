<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CIEL ON TOP — Realistic Lava Lamp Liquid (Green & Red)</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #0a0a0a;
      position: relative;
    }

    /* ============================================ */
    /* REALISTIC LAVA LAMP LIQUID BACKGROUND        */
    /* GREEN on LEFT, RED/PINK on RIGHT - FADED     */
    /* Smooth, organic, visible (NOT blacked out)   */
    /* ============================================ */
    .lava-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #030308;
      overflow: hidden;
      z-index: 0;
    }

    /* Main liquid blobs - realistic organic shapes */
    .liquid-blob {
      position: absolute;
      filter: blur(35px) contrast(1.6);
      animation: morphOrganic 16s infinite alternate ease-in-out;
      will-change: transform, border-radius;
    }

    /* BIG GREEN BLOB - LEFT SIDE (visible, faded green) */
    .green-blob-1 {
      width: 550px;
      height: 550px;
      background: radial-gradient(ellipse at 40% 50%, #33ff88, #00aa44, #006622);
      left: -120px;
      top: 15%;
      animation-duration: 18s;
      animation-delay: 0s;
      opacity: 0.9;
    }

    /* SECOND GREEN BLOB - more depth */
    .green-blob-2 {
      width: 420px;
      height: 420px;
      background: radial-gradient(ellipse at 35% 55%, #44ff99, #22cc66, #008833);
      left: 5%;
      bottom: 10%;
      animation-duration: 20s;
      animation-delay: -5s;
      opacity: 0.85;
    }

    /* THIRD GREEN ACCENT */
    .green-blob-3 {
      width: 350px;
      height: 350px;
      background: radial-gradient(ellipse at 45% 40%, #55ffaa, #33dd77, #119944);
      left: 15%;
      top: 50%;
      animation-duration: 22s;
      animation-delay: -3s;
      opacity: 0.8;
    }

    /* BIG RED/PINK BLOB - RIGHT SIDE (faded red) */
    .red-blob-1 {
      width: 520px;
      height: 520px;
      background: radial-gradient(ellipse at 60% 50%, #ff4488, #cc2266, #881144);
      right: -100px;
      top: 20%;
      animation-duration: 17s;
      animation-delay: -2s;
      opacity: 0.88;
    }

    /* SECOND RED BLOB - deeper pink */
    .red-blob-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(ellipse at 55% 60%, #ff6699, #dd3388, #991155);
      right: 8%;
      bottom: 15%;
      animation-duration: 19s;
      animation-delay: -7s;
      opacity: 0.82;
    }

    /* THIRD RED/MAGENTA ACCENT */
    .red-blob-3 {
      width: 380px;
      height: 380px;
      background: radial-gradient(ellipse at 50% 45%, #ff77aa, #ee4499, #aa2266);
      right: 20%;
      top: 55%;
      animation-duration: 21s;
      animation-delay: -4s;
      opacity: 0.78;
    }

    /* TRANSITIONAL ORANGE/AMBER (blending green and red) */
    .amber-blob {
      width: 320px;
      height: 320px;
      background: radial-gradient(ellipse at 50% 50%, #ffaa55, #dd7722, #994411);
      left: 38%;
      top: 40%;
      animation-duration: 15s;
      animation-delay: -6s;
      opacity: 0.7;
    }

    /* Organic morphing - makes it look like REAL thick liquid moving */
    @keyframes morphOrganic {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        border-radius: 45% 55% 40% 60% / 50% 45% 55% 50%;
      }
      20% {
        transform: translate(30px, -25px) scale(1.06) rotate(5deg);
        border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%;
      }
      40% {
        transform: translate(-20px, 35px) scale(0.94) rotate(-4deg);
        border-radius: 60% 40% 35% 65% / 55% 50% 50% 45%;
      }
      60% {
        transform: translate(40px, 20px) scale(1.03) rotate(8deg);
        border-radius: 40% 60% 65% 35% / 45% 60% 40% 55%;
      }
      80% {
        transform: translate(-25px, -20px) scale(0.97) rotate(-6deg);
        border-radius: 50% 50% 45% 55% / 60% 40% 60% 40%;
      }
      100% {
        transform: translate(20px, 30px) scale(1.02) rotate(3deg);
        border-radius: 48% 52% 42% 58% / 52% 48% 52% 48%;
      }
    }

    /* Liquid tendrils for realistic stretching (like real lava lamp) */
    .tendril {
      position: absolute;
      filter: blur(40px) contrast(1.4);
      animation: tendrilFlow 20s infinite alternate;
    }

    .tendril-green {
      width: 280px;
      height: 550px;
      background: linear-gradient(180deg, #33ff88, #00aa44, #006622);
      left: -30px;
      top: -80px;
      border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      animation-duration: 24s;
      opacity: 0.7;
    }

    .tendril-red {
      width: 260px;
      height: 520px;
      background: linear-gradient(0deg, #ff4488, #cc2266, #881144);
      right: -20px;
      bottom: -60px;
      border-radius: 55% 45% 65% 35% / 40% 55% 45% 60%;
      animation-duration: 26s;
      animation-delay: -5s;
      opacity: 0.65;
    }

    .tendril-amber {
      width: 230px;
      height: 480px;
      background: linear-gradient(135deg, #ffaa55, #dd7722);
      left: 35%;
      top: -40px;
      border-radius: 60% 40% 35% 65% / 55% 45% 55% 45%;
      animation-duration: 22s;
      animation-delay: -3s;
      opacity: 0.55;
    }

    @keyframes tendrilFlow {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%;
      }
      33% {
        transform: translate(35px, -45px) rotate(10deg) scale(1.07);
        border-radius: 55% 45% 65% 35% / 40% 55% 45% 60%;
      }
      66% {
        transform: translate(-30px, 40px) rotate(-8deg) scale(0.93);
        border-radius: 35% 65% 45% 55% / 60% 50% 50% 40%;
      }
      100% {
        transform: translate(25px, -20px) rotate(4deg) scale(1.03);
        border-radius: 48% 52% 38% 62% / 55% 45% 55% 45%;
      }
    }

    /* Floating bubbles for lava lamp realism */
    .bubble {
      position: absolute;
      filter: blur(20px);
      animation: bubbleFloat 14s infinite alternate;
    }

    .bubble-1 {
      width: 100px;
      height: 100px;
      background: #44ffaa;
      left: 12%;
      top: 65%;
      animation-duration: 12s;
      opacity: 0.5;
    }
    .bubble-2 {
      width: 80px;
      height: 80px;
      background: #ff66aa;
      right: 18%;
      top: 55%;
      animation-duration: 10s;
      animation-delay: -3s;
      opacity: 0.45;
    }
    .bubble-3 {
      width: 120px;
      height: 120px;
      background: #88ff66;
      left: 28%;
      top: 75%;
      animation-duration: 15s;
      animation-delay: -6s;
      opacity: 0.48;
    }
    .bubble-4 {
      width: 70px;
      height: 70px;
      background: #ff8866;
      right: 30%;
      top: 35%;
      animation-duration: 9s;
      animation-delay: -2s;
      opacity: 0.4;
    }
    .bubble-5 {
      width: 90px;
      height: 90px;
      background: #aaff66;
      left: 55%;
      top: 80%;
      animation-duration: 13s;
      animation-delay: -8s;
      opacity: 0.5;
    }

    @keyframes bubbleFloat {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0.3;
      }
      100% {
        transform: translateY(-60px) scale(1.15);
        opacity: 0.6;
      }
    }

    /* VERY LIGHT vignette - just to add depth, NOT to black out the background */
    .light-vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.3) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Subtle scanlines - barely noticeable */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.05) 2px,
        rgba(0, 0, 0, 0.05) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Main text container - pure white */
    .container {
      position: relative;
      z-index: 20;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      pointer-events: none;
    }

    /* PURE WHITE TEXT - exactly as requested */
    .glitch-text {
      position: relative;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      font-weight: 400;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 12px;
      text-shadow: 
        0 0 20px rgba(255, 255, 255, 0.9),
        0 0 40px rgba(255, 255, 255, 0.5),
        0 0 60px rgba(255, 255, 255, 0.25);
      animation: subtleGlitch 0.3s infinite;
      white-space: nowrap;
      padding: 0 20px;
      background: transparent;
    }

    /* Glitch layers - pure white only */
    .glitch-text::before,
    .glitch-text::after {
      content: "CIEL ON TOP";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: #ffffff;
      background: transparent;
    }

    .glitch-text::before {
      left: 2px;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      opacity: 0.55;
      transform: translateX(-1px);
      animation: glitchShift1 0.28s infinite alternate;
    }

    .glitch-text::after {
      left: -2px;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      opacity: 0.55;
      transform: translateX(1px);
      animation: glitchShift2 0.25s infinite alternate;
    }

    @keyframes subtleGlitch {
      0%, 90%, 100% { transform: translate(0, 0); }
      92% { transform: translate(-1.5px, 0.8px); }
      94% { transform: translate(1.5px, -0.5px); }
      96% { transform: translate(-0.8px, 0.4px); }
      98% { transform: translate(0.8px, -0.3px); }
    }

    @keyframes glitchShift1 {
      0% { transform: translateX(-1px); opacity: 0.5; }
      100% { transform: translateX(2.5px); opacity: 0.7; }
    }

    @keyframes glitchShift2 {
      0% { transform: translateX(1px); opacity: 0.5; }
      100% { transform: translateX(-2.5px); opacity: 0.7; }
    }

    /* Glitch bars - pure white */
    .glitch-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.85);
      opacity: 0;
      z-index: 25;
      pointer-events: none;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
      animation: barGlitch 2.6s infinite;
    }

    .glitch-bar:nth-child(1) { top: 18%; animation-delay: 0.3s; }
    .glitch-bar:nth-child(2) { top: 42%; animation-delay: 1.2s; }
    .glitch-bar:nth-child(3) { top: 63%; animation-delay: 0.8s; }
    .glitch-bar:nth-child(4) { top: 82%; animation-delay: 1.9s; }
    .glitch-bar:nth-child(5) { top: 30%; animation-delay: 0.5s; height: 1px; }
    .glitch-bar:nth-child(6) { top: 75%; animation-delay: 2.2s; }

    @keyframes barGlitch {
      0%, 94%, 100% { opacity: 0; transform: translateX(-100%); }
      95% { opacity: 0.85; transform: translateX(0); }
      96.5% { opacity: 0; transform: translateX(100%); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .glitch-text {
        font-size: 14vw;
        letter-spacing: 6px;
        white-space: normal;
        word-break: keep-all;
        line-height: 1.2;
      }
      .glitch-text::before,
      .glitch-text::after {
        font-size: 14vw;
        letter-spacing: 6px;
      }
      .green-blob-1, .red-blob-1 {
        width: 350px;
        height: 350px;
      }
      .green-blob-2, .red-blob-2, .green-blob-3, .red-blob-3 {
        width: 280px;
        height: 280px;
      }
    }
  </style>
</head>
<body>

  <!-- REALISTIC LAVA LAMP BACKGROUND - GREEN (LEFT) & RED (RIGHT) VISIBLE -->
  <div class="lava-background">
    <!-- GREEN BLOBS - LEFT SIDE (faded, realistic) -->
    <div class="liquid-blob green-blob-1"></div>
    <div class="liquid-blob green-blob-2"></div>
    <div class="liquid-blob green-blob-3"></div>
    
    <!-- RED/PINK BLOBS - RIGHT SIDE -->
    <div class="liquid-blob red-blob-1"></div>
    <div class="liquid-blob red-blob-2"></div>
    <div class="liquid-blob red-blob-3"></div>
    
    <!-- TRANSITIONAL AMBER BLOB (mixes green & red area) -->
    <div class="liquid-blob amber-blob"></div>
    
    <!-- Liquid tendrils for realistic stretching -->
    <div class="tendril tendril-green"></div>
    <div class="tendril tendril-red"></div>
    <div class="tendril tendril-amber"></div>
    
    <!-- Floating bubbles (lava lamp effect) -->
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>
    <div class="bubble bubble-4"></div>
    <div class="bubble bubble-5"></div>
  </div>

  <!-- Light overlays - NOT blacking out the background -->
  <div class="light-vignette"></div>
  <div class="scanlines"></div>

  <!-- Glitch bars -->
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>

  <!-- Pure white text -->
  <div class="container">
    <div class="glitch-text">CIEL ON TOP</div>
  </div>

</body>
</html>
