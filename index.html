<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Popup UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #a18cd1, #fbc2eb, #8ec5fc, #e0c3fc);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
}

/* Animated Background */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Center Container */
.container {
    text-align: center;
}

/* Click Text */
.click-text {
    font-size: 24px;
    font-weight: 600;
    color: white;
    cursor: pointer;
    padding: 15px 30px;
    border-radius: 50px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.click-text:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.3);
}

/* Popup Base */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.popup.active {
    opacity: 1;
    visibility: visible;
}

/* Popup Content */
.popup-content {
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 360px;
    text-align: center;
    transform: scale(0.7) translateY(40px);
    opacity: 0;
    transition: all 0.35s ease;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
}

.popup.active .popup-content {
    transform: scale(1) translateY(0);
    opacity: 1;
}

/* Image */
.popup-content img {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 12px;
}

/* Text popup design */
.popup-content h2 {
    color: #6d28d9;
    margin-bottom: 8px;
}

.popup-content p {
    color: #555;
    margin-bottom: 15px;
}

/* Buttons */
.btn {
    padding: 10px 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin: 5px;
    transition: 0.2s;
}

.primary {
    background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
}

.secondary {
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
}

.btn:hover {
    transform: scale(1.05);
}

/* Mobile */
@media (max-width: 480px) {
    .click-text {
        font-size: 18px;
        padding: 12px 20px;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="click-text" onclick="openChoice()">Click Me ✨</div>
</div>

<!-- Choice Popup -->
<div class="popup" id="choicePopup">
    <div class="popup-content">
        <h2>Select Option</h2>
        <p>What do you want to open?</p>
        <button class="btn primary" onclick="openImage()">View Image</button>
        <button class="btn secondary" onclick="openText()">View Message</button>
        <button class="btn" onclick="closeAll()">Close</button>
    </div>
</div>

<!-- Image Popup -->
<div class="popup" id="imagePopup">
    <div class="popup-content">
        <img src="images/myphoto.jpg" alt="Your Image">
        <button class="btn primary" onclick="closeAll()">Close</button>
    </div>
</div>

<!-- Text Popup -->
<div class="popup" id="textPopup">
    <div class="popup-content">
        <h2>I-klik ko nigga</h2>
        <p>Putangina mo nigs.</p>
        <button class="btn secondary" onclick="closeAll()">Close</button>
    </div>
</div>

<script>
function openChoice() {
    document.getElementById("choicePopup").classList.add("active");
}

function openImage() {
    closeAll();
    document.getElementById("imagePopup").classList.add("active");
}

function openText() {
    closeAll();
    document.getElementById("textPopup").classList.add("active");
}

function closeAll() {
    document.querySelectorAll(".popup").forEach(p => p.classList.remove("active"));
}
</script>

</body>
</html>
