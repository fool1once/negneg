<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bisaya nigs</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    overflow: hidden;
}

/* Center Button */
.click-btn {
    padding: 15px 35px;
    font-size: 20px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    background: white;
    color: #4f46e5;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.click-btn:hover {
    transform: scale(1.08);
}

/* Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.popup.active {
    opacity: 1;
    visibility: visible;
}

/* Popup Card */
.popup-content {
    background: white;
    border-radius: 20px;
    padding: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    transform: scale(0.7);
    opacity: 0;
    transition: all 0.4s ease;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}

.popup.active .popup-content {
    transform: scale(1);
    opacity: 1;
}

/* Image */
.popup-content img {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 10px;
}

/* Text */
.popup-content h2 {
    color: #4f46e5;
    margin-bottom: 5px;
}

.popup-content p {
    color: #555;
    margin-bottom: 15px;
}

/* Close */
.close-btn {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.close-btn:hover {
    transform: scale(1.05);
}

/* Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    background: red;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<button class="click-btn" onclick="openPopup()">Click Me 🎉</button>

<div class="popup" id="popup">
    <div class="popup-content">
        <img src="images/myphoto.jpg" alt="Image">
        <h2>Hello taina mo</h2>
        <p>By fool to nigs.</p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").classList.add("active");
    launchConfetti();
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}

/* Confetti Effect */
function launchConfetti() {
    for (let i = 0; i < 40; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            `hsl(${Math.random()*360}, 100%, 50%)`;

        confetti.style.animationDuration = 
            (Math.random() * 2 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4000);
    }
}
</script>

</body>
</html>
