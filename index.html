<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store of Heidee</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff4e8a, #ff004c, #ff6a88, #ff1744);
    background-size: 300% 300%;
    animation: bg 8s ease infinite;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* BUTTON */
.click-btn {
    padding: 16px 40px;
    font-size: 20px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    background: white;
    color: #ff004c;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* LOADER */
.loader {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.loader.active {
    opacity: 1;
    visibility: visible;
}

.cute-loader {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}

.face {
    font-size: 40px;
    animation: bounce 1s infinite;
}

@keyframes bounce {
    50% { transform: translateY(-10px); }
}

/* POPUP STORE */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.popup.active {
    opacity: 1;
    visibility: visible;
}

.store {
    background: white;
    width: 90%;
    max-width: 500px;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    animation: pop 0.4s ease;
}

@keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* HEADER */
.store h1 {
    color: #ff004c;
    margin-bottom: 10px;
}

/* TYPEWRITER TEXT */
.type-text {
    font-size: 14px;
    color: #333;
    min-height: 40px;
}

/* PRODUCTS */
.products {
    margin-top: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.card {
    background: #fff0f5;
    padding: 10px;
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* CLOSE */
.close-btn {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: #ff004c;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<button class="click-btn" onclick="start()">Enter Store</button>

<!-- LOADER -->
<div class="loader" id="loader">
    <div class="cute-loader">
        <div class="face">🐱</div>
        <p>Entering store...</p>
    </div>
</div>

<!-- STORE POPUP -->
<div class="popup" id="popup">
    <div class="store">
        <h1>🛍️ Store of Heidee</h1>
        <p class="type-text" id="typeText"></p>

        <div class="products">
            <div class="card">
                <img src="https://via.placeholder.com/150">
                <p>Cute Item 💖</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150">
                <p>Stylish Fit ✨</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150">
                <p>Sweet Stuff 🍬</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150">
                <p>Special Pick 🌸</p>
            </div>
        </div>

        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function start() {
    document.getElementById("loader").classList.add("active");

    setTimeout(() => {
        document.getElementById("loader").classList.remove("active");
        openPopup();
        typeText();
    }, 2000);
}

function openPopup() {
    document.getElementById("popup").classList.add("active");
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}

/* TYPEWRITER EFFECT */
function typeText() {
    const text = "Welcome to Heidee's Store ✨ A cute place for stylish and fun items just for you!";
    let i = 0;
    const speed = 40;

    function typing() {
        if (i < text.length) {
            document.getElementById("typeText").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    document.getElementById("typeText").innerHTML = "";
    typing();
}
</script>

</body>
</html>
