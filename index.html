<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SERVANDO ON TOP</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  width:100%;
  overflow:hidden;
  background:#000;
  font-family:'Anton',sans-serif;
}

/* =======================
   VIDEO BACKGROUND
======================= */
.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;

  filter: blur(18px) saturate(1.6) contrast(1.2) brightness(0.6);
  transform: scale(1.1);
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  z-index:-1;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.75) 100%);
}

/* =======================
   TEXT
======================= */
.container{
  position:relative;
  z-index:10;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.glitch-text{
  font-size:12vw;
  color:#fff;
  letter-spacing:18px;
  text-transform:uppercase;
  position:relative;

  text-shadow:
    0 0 15px rgba(255,255,255,0.8),
    0 0 40px rgba(255,255,255,0.3);

  animation:glitch 0.3s infinite;
}

/* glitch layers */
.glitch-text::before,
.glitch-text::after{
  content:"SERVANDO";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  color:#fff;
}

.glitch-text::before{
  transform:translate(-2px,0);
  opacity:0.5;
  clip-path:polygon(0 0,100% 0,100% 40%,0 40%);
}

.glitch-text::after{
  transform:translate(2px,0);
  opacity:0.5;
  clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);
}

@keyframes glitch{
  0%,100%{transform:translate(0,0);}
  25%{transform:translate(-1px,1px);}
  50%{transform:translate(1px,-1px);}
  75%{transform:translate(-1px,0);}
}

/* MOBILE */
@media(max-width:768px){
  .glitch-text{
    font-size:18vw;
    letter-spacing:6px;
  }
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND VIDEO (PUT YOUR FILE NAME HERE) -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="lava.mp4" type="video/mp4">
</video>

<!-- DARK LAYER -->
<div class="overlay"></div>

<!-- TEXT -->
<div class="container">
  <div class="glitch-text">SERVANDO</div>
</div>

</body>
</html>
