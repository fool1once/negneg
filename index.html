<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL ON TOP</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
    }

    /* REAL LIQUID BACKGROUND */
    .liquid {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      filter: blur(80px) contrast(120%);
      animation: move 12s ease-in-out infinite alternate;
    }

    .liquid::before,
    .liquid::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #39ff14, transparent 40%),
                  radial-gradient(circle at 70% 40%, #00ffff, transparent 40%),
                  radial-gradient(circle at 50% 70%, #ff00ff, transparent 40%),
                  radial-gradient(circle at 80% 80%, #ff6600, transparent 40%);
      mix-blend-mode: screen;
      animation: flow 10s ease-in-out infinite alternate;
    }

    .liquid::after {
      animation-duration: 14s;
      opacity: 0.7;
    }

    @keyframes move {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(-5%, -5%) scale(1.1); }
      100% { transform: translate(5%, 5%) scale(1); }
    }

    @keyframes flow {
      0% {
        transform: rotate(0deg) scale(1);
      }
      50% {
        transform: rotate(180deg) scale(1.2);
      }
      100% {
        transform: rotate(360deg) scale(1);
      }
    }

    /* DARK OVERLAY (like video depth) */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
    }

    /* TEXT */
    .title {
      position: relative;
      z-index: 2;
      font-family: 'Anton', sans-serif;
      font-size: 14vw;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-align: center;
    }

  </style>
</head>

<body>

  <div class="liquid"></div>
  <div class="overlay"></div>

  <div class="title">CIEL ON TOP</div>

</body>
</html>
