<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heidee 💗</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#0a0a14;
    color:white;
    overflow-x:hidden;
}

/* PARALLAX BACKGROUND */
.parallax{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.layer{
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,#ff4da6 1px,transparent 1px);
    background-size:40px 40px;
    opacity:0.15;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav h2{
    color:#ff4da6;
    text-shadow:0 0 10px #ff4da6;
}

nav a{
    margin-left:20px;
    color:white;
    text-decoration:none;
}

nav a:hover{
    color:#ff4da6;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:50px;
    color:#ff4da6;
    text-shadow:0 0 20px #ff4da6;
}

/* IMAGE */
.image-container{
    width:250px;
    height:250px;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
    box-shadow:0 0 30px #ff4da6;
}

.image-container img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

.image-container:hover img{
    transform:scale(1.2);
}

/* BUTTON */
.btn{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
}

/* CHAT */
.chat-box{
    width:90%;
    max-width:400px;
    margin:40px auto;
    background:#111;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 20px #ff4da6;
}

.message{
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    width:fit-content;
}

.me{
    background:#ff4da6;
    margin-left:auto;
}

.her{
    background:#222;
}

/* MOBILE */
@media(max-width:600px){
    .hero h1{font-size:30px;}
}
</style>
</head>

<body>

<!-- PARALLAX -->
<div class="parallax">
    <div class="layer" id="layer1"></div>
    <div class="layer" id="layer2"></div>
</div>

<nav>
    <h2>Heidee 💗</h2>
    <div>
        <a href="#home">Home</a>
        <a href="#chat">Chat</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <h1>Heidee 💗</h1>
    <p>You make everything glow ✨</p>

    <div class="image-container">
        <img src="images/myphoto.jpg">
    </div>

    <button class="btn" onclick="startChat()">Start Chat 💬</button>
</section>

<!-- CHAT -->
<section id="chat">
    <div class="chat-box" id="chatBox"></div>
</section>

<script>
// PARALLAX SCROLL
window.addEventListener("scroll", () => {
    let scroll = window.scrollY;
    document.getElementById("layer1").style.transform =
        `translateY(${scroll * 0.2}px)`;
    document.getElementById("layer2").style.transform =
        `translateY(${scroll * 0.4}px)`;
});

// MOUSE PARALLAX
document.addEventListener("mousemove", e=>{
    let x = (e.clientX / window.innerWidth - 0.5) * 20;
    let y = (e.clientY / window.innerHeight - 0.5) * 20;

    document.getElementById("layer1").style.transform +=
        ` translate(${x}px, ${y}px)`;
});

// CHAT SIMULATION
const chat = [
    {text:"hi...", type:"her"},
    {text:"hey 😳", type:"me"},
    {text:"you made this?", type:"her"},
    {text:"yeah... for you 💗", type:"me"},
    {text:"that's actually cute", type:"her"},
    {text:"i really like you", type:"me"}
];

function startChat(){
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    let i = 0;

    function send(){
        if(i >= chat.length) return;

        let msg = document.createElement("div");
        msg.className = "message " + chat[i].type;
        msg.innerText = chat[i].text;

        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;

        i++;
        setTimeout(send, 1200);
    }

    send();
}
</script>

</body>
</html>
