<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL ON TOP</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;

      /* FAST color switching */
      animation: bgSwitch 1s infinite;
    }

    @keyframes bgSwitch {
      0%   { background: #000000; }
      25%  { background: #001a00; }
      50%  { background: #000000; }
      75%  { background: #002200; }
      100% { background: #000000; }
    }

    /* Hacker scanline overlay */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,255,0,0.05) 0px,
        rgba(0,255,0,0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
    }

    .title {
      font-size: 10vw; /* BIGGER */
      font-weight: 900;
      text-align: center;
      letter-spacing: 8px;
      text-transform: uppercase;
      position: relative;

      /* Hacker neon green */
      color: #00ff00;

      text-shadow:
        0 0 5px #00ff00,
        0 0 10px #00ff00,
        0 0 20px #00ff00,
        0 0 40px #00ff00;

      animation: flicker 0.1s infinite;
    }

    /* Glitch layers */
    .title::before,
    .title::after {
      content: "CIEL ON TOP";
      position: absolute;
      left: 0;
      width: 100%;
      opacity: 0.7;
    }

    .title::before {
      color: #00ffff;
      animation: glitch1 0.2s infinite;
    }

    .title::after {
      color: #00ff00;
      animation: glitch2 0.15s infinite;
    }

    @keyframes glitch1 {
      0% { transform: translate(0); }
      20% { transform: translate(-4px, 2px); }
      40% { transform: translate(-4px, -2px); }
      60% { transform: translate(4px, 2px); }
      80% { transform: translate(4px, -2px); }
      100% { transform: translate(0); }
    }

    @keyframes glitch2 {
      0% { transform: translate(0); }
      20% { transform: translate(4px, -2px); }
      40% { transform: translate(4px, 2px); }
      60% { transform: translate(-4px, -2px); }
      80% { transform: translate(-4px, 2px); }
      100% { transform: translate(0); }
    }

    /* Flicker effect */
    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.85; }
      100% { opacity: 1; }
    }

  </style>
</head>

<body>
  <div class="title">CIEL ON TOP</div>
</body>
</html>
