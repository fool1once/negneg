<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL ON TOP</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #0a0a0a;
    }

    .title-container {
      position: relative;
      display: inline-block;
    }

    .title {
      font-family: 'Anton', sans-serif;
      font-size: 12vw;
      color: white;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      
      /* Bling shine effect */
      background: linear-gradient(
        120deg,
        #ffffff 0%,
        #ffffff 40%,
        #ff0000 50%,
        #ffffff 60%,
        #ffffff 100%
      );
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 2s infinite;
    }

    @keyframes shine {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* Blood drips container */
    .blood-drips {
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 60px;
      z-index: 1;
      pointer-events: none;
    }

    /* Individual blood drops */
    .drop {
      position: absolute;
      background: #cc0000;
      border-radius: 0 0 50% 50%;
      animation: drip 2s infinite ease-in;
    }

    .drop:nth-child(1) {
      left: 10%;
      width: 8px;
      height: 20px;
      animation-delay: 0s;
    }

    .drop:nth-child(2) {
      left: 25%;
      width: 6px;
      height: 35px;
      animation-delay: 0.3s;
    }

    .drop:nth-child(3) {
      left: 40%;
      width: 10px;
      height: 25px;
      animation-delay: 0.6s;
    }

    .drop:nth-child(4) {
      left: 55%;
      width: 5px;
      height: 40px;
      animation-delay: 0.9s;
    }

    .drop:nth-child(5) {
      left: 70%;
      width: 7px;
      height: 30px;
      animation-delay: 1.2s;
    }

    .drop:nth-child(6) {
      left: 85%;
      width: 9px;
      height: 22px;
      animation-delay: 1.5s;
    }

    .drop:nth-child(7) {
      left: 95%;
      width: 6px;
      height: 28px;
      animation-delay: 1.8s;
    }

    @keyframes drip {
      0%, 100% {
        transform: translateY(0) scaleY(1);
        opacity: 1;
      }
      50% {
        transform: translateY(15px) scaleY(1.3);
        opacity: 0.8;
      }
      80% {
        transform: translateY(25px) scaleY(0.8);
        opacity: 0.6;
      }
    }

    /* Blood pool at bottom */
    .blood-pool {
      position: absolute;
      bottom: -15px;
      left: 5%;
      width: 90%;
      height: 8px;
      background: #cc0000;
      border-radius: 50%;
      opacity: 0.8;
      animation: pool 2s infinite ease-in-out;
    }

    @keyframes pool {
      0%, 100% { transform: scaleX(1); opacity: 0.8; }
      50% { transform: scaleX(1.1); opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="title-container">
    <div class="title">CIEL ON TOP</div>
    <div class="blood-drips">
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="drop"></div>
      <div class="blood-pool"></div>
    </div>
  </div>
</body>
</html>
