<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Popup UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* Container */
.container {
    text-align: center;
}

/* Click Text */
.click-text {
    font-size: 22px;
    font-weight: 600;
    color: #4f46e5;
    cursor: pointer;
    transition: 0.3s;
}

.click-text:hover {
    color: #3730a3;
    transform: scale(1.05);
}

/* Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.popup.active {
    opacity: 1;
    visibility: visible;
}

/* Popup Content */
.popup-content {
    background: white;
    padding: 15px;
    border-radius: 18px;
    width: 90%;
    max-width: 350px;
    transform: scale(0.85);
    transition: 0.3s;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.popup.active .popup-content {
    transform: scale(1);
}

/* Image */
.popup-content img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
}

/* Close Button */
.close-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 12px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.close-btn:hover {
    background: #3730a3;
}
</style>

</head>
<body>

<div class="container">
    <div class="click-text" onclick="openPopup()">Click to View 💫</div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        <!-- 🔥 THIS IS YOUR GITHUB IMAGE -->
        <img src="images/myphoto.jpg" alt="Popup Image">
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").classList.add("active");
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
