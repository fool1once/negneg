<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bisaya nigs</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff4e8a, #ff004c, #ff6a88, #ff1744);
    background-size: 300% 300%;
    animation: gradientMove 8s ease infinite;
    overflow: hidden;
}

/* Background animation */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Button */
.click-btn {
    position: relative;
    overflow: hidden;
    padding: 16px 40px;
    font-size: 20px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    background: white;
    color: #ff004c;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.click-btn:hover {
    transform: translateY(-3px) scale(1.07);
}

/* Ripple effect */
.click-btn span.ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    background: rgba(255,0,76,0.4);
    animation: ripple 0.6s linear;
    pointer-events: none;
}

@keyframes ripple {
    to {
        transform: scale(4);
        opacity: 0;
    }
}

/* Popup */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.popup.active {
    opacity: 1;
    visibility: visible;
}

/* Glow Border Animation */
@keyframes glowBorder {
    0% { box-shadow: 0 0 10px #ff004c, 0 0 20px #ff4e8a; }
    50% { box-shadow: 0 0 25px #ff1744, 0 0 50px #ff6a88; }
    100% { box-shadow: 0 0 10px #ff004c, 0 0 20px #ff4e8a; }
}

/* Popup Card */
.popup-content {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(15px);
    border-radius: 22px;
    padding: 22px;
    width: 90%;
    max-width: 360px;
    text-align: center;
    transform: scale(0.7) translateY(40px);
    opacity: 0;
    transition: all 0.4s ease;
    border: 2px solid #ff4e8a;
    animation: glowBorder 2s infinite ease-in-out;
}

.popup.active .popup-content {
    transform: scale(1) translateY(0);
    opacity: 1;
}

/* Image */
.popup-content img {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 12px;
}

/* Text */
.popup-content h2 {
    color: #ff004c;
}

.popup-content p {
    color: #333;
    margin-bottom: 15px;
}

/* Close */
.close-btn {
    padding: 11px;
    width: 100%;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #ff4e8a, #ff004c);
    color: white;
    cursor: pointer;
    transition: 0.25s;
}

.close-btn:hover {
    transform: scale(1.05);
}

/* Confetti */
.confetti {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 2px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<button class="click-btn" onclick="handleClick(event)">Press me Nigs</button>

<div class="popup" id="popup">
    <div class="popup-content">
        <img src="images/myphoto.jpg" alt="Image">
        <h2>tangina mo</h2>
        <p>By fool to nigs.</p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function handleClick(e) {
    rippleEffect(e);
    openPopup();
}

function rippleEffect(e) {
    const button = e.currentTarget;
    const circle = document.createElement("span");
    const diameter = Math.max(button.clientWidth, button.clientHeight);

    circle.style.width = circle.style.height = diameter + "px";
    circle.style.left = e.offsetX - diameter / 2 + "px";
    circle.style.top = e.offsetY - diameter / 2 + "px";
    circle.classList.add("ripple");

    button.appendChild(circle);

    setTimeout(() => circle.remove(), 600);
}

function openPopup() {
    document.getElementById("popup").classList.add("active");
    launchConfetti();
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}

function launchConfetti() {
    for (let i = 0; i < 50; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            `hsl(${Math.random()*360}, 100%, 60%)`;

        confetti.style.animationDuration = 
            (Math.random() * 2 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4000);
    }
}
</script>

</body>
</html>
