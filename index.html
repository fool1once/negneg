<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heidee 💗</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Poppins", sans-serif;
    scroll-behavior: smooth;
}

body{
    background:#0f0f1a;
    color:white;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    z-index:1000;
}

nav h2{
    color:#ff6b81;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:#ff6b81;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: radial-gradient(circle,#1a1a2e,#0f0f1a);
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin:10px 0;
}

/* IMAGE */
.image-container{
    width:250px;
    height:250px;
    overflow:hidden;
    border-radius:20px;
    margin-top:20px;
}

.image-container img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

.image-container:hover img{
    transform:scale(1.2) rotate(2deg);
}

/* SECTIONS */
.section{
    padding:80px 20px;
    text-align:center;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:#1a1a2e;
    padding:20px;
    border-radius:15px;
    width:250px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px #ff6b81;
}

/* BUTTON */
.btn{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff6b81;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

/* SECRET */
input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

/* FOOTER */
footer{
    padding:20px;
    text-align:center;
    background:#111;
}

/* MOBILE */
@media(max-width:600px){
    .hero h1{
        font-size:30px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Heidee 💗</h2>
    <div>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#activity">Activities</a>
        <a href="#secret">Secret</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <h1>Heidee 💗</h1>
    <p>You make everything feel special ✨</p>

    <div class="image-container">
        <img src="images/myphoto.jpg">
    </div>

    <button class="btn" onclick="showMessage()">Click me 💌</button>
    <p id="message"></p>
</section>

<!-- ABOUT -->
<section class="section" id="about">
    <h2>Why You're Special 💖</h2>

    <div class="cards">
        <div class="card">Your smile hits different 🌸</div>
        <div class="card">You feel like home 🏡</div>
        <div class="card">You're my favorite person 💕</div>
    </div>
</section>

<!-- ACTIVITIES -->
<section class="section" id="activity">
    <h2>Fun Stuff 🎮</h2>

    <button class="btn" onclick="changeTheme()">Change Theme 🎨</button>
    <button class="btn" onclick="spawnHearts()">Spawn Hearts 💖</button>

    <div id="gameArea"></div>
</section>

<!-- SECRET -->
<section class="section" id="secret">
    <h2>Secret Unlock 🔐</h2>
    <p>Hint: something you feel 💗</p>

    <input type="text" id="secretInput">
    <button class="btn" onclick="unlock()">Unlock</button>

    <p id="secretText"></p>
</section>

<footer>
    Made with 💖 for Heidee
</footer>

<script>
// MESSAGE
function showMessage(){
    const messages=[
        "You’re my favorite 💕",
        "I really like you 💗",
        "You make my day better ✨"
    ];
    document.getElementById("message").innerText =
    messages[Math.floor(Math.random()*messages.length)];
}

// THEME
function changeTheme(){
    document.body.style.background =
    "linear-gradient(135deg,#1a1a2e,#16213e)";
}

// HEART GAME
function spawnHearts(){
    const area=document.getElementById("gameArea");
    for(let i=0;i<10;i++){
        let heart=document.createElement("div");
        heart.innerText="💖";
        heart.style.position="absolute";
        heart.style.left=Math.random()*100+"vw";
        heart.style.top="0";
        heart.style.fontSize="25px";
        heart.style.animation="fall 3s linear";
        area.appendChild(heart);

        heart.onclick=()=>heart.remove();
    }
}

// SECRET
function unlock(){
    let val=document.getElementById("secretInput").value.toLowerCase();
    if(val==="love"){
        document.getElementById("secretText").innerText =
        "💖 You unlocked my feelings for you.";
    }else{
        document.getElementById("secretText").innerText =
        "❌ try again";
    }
}

// ANIMATION
const style=document.createElement('style');
style.innerHTML=`
@keyframes fall{
    from{transform:translateY(-50px);}
    to{transform:translateY(500px);}
}`;
document.head.appendChild(style);
</script>

</body>
</html>
