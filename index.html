<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERVADO</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;

      /* Neon color switching every 1 sec */
      animation: bgSwitch 2s infinite;
    }

    @keyframes bgSwitch {
      0%   { background: #ff00ff; }   /* neon pink */
      20%  { background: #00ffff; }   /* neon cyan */
      40%  { background: #39ff14; }   /* neon green */
      60%  { background: #ff073a; }   /* neon red */
      80%  { background: #7f00ff; }   /* neon purple */
      100% { background: #ff00ff; }
    }

    .title {
      font-family: 'Anton', sans-serif;
      font-size: 12vw; /* BIG like your image */
      color: white;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

  </style>
</head>

<body>
  <div class="title">SERVADO</div>
</body>
</html>
