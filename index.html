<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Popup UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
    }

    .container {
        text-align: center;
    }

    .btn {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        background: #38bdf8;
        color: #0f172a;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .btn:hover {
        transform: scale(1.05);
        background: #0ea5e9;
    }

    /* Popup */
    .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: 0.3s;
    }

    .popup.active {
        opacity: 1;
        visibility: visible;
    }

    .popup-content {
        background: #1e293b;
        padding: 25px;
        border-radius: 16px;
        text-align: center;
        width: 90%;
        max-width: 350px;
        transform: scale(0.8);
        transition: 0.3s;
    }

    .popup.active .popup-content {
        transform: scale(1);
    }

    .popup-content h2 {
        margin-bottom: 10px;
    }

    .popup-content p {
        margin-bottom: 20px;
        color: #cbd5f5;
    }

    .close-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #f43f5e;
        color: white;
        cursor: pointer;
    }

    .close-btn:hover {
        background: #e11d48;
    }

    /* Mobile Optimization */
    @media (max-width: 480px) {
        .btn {
            font-size: 16px;
            padding: 12px 25px;
        }
    }
</style>

</head>
<body>

<div class="container">
    <button class="btn" onclick="openPopup()">Click Me</button>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="popupTitle">Tangina mo nigs</h2>
        <p id="popupMessage">By fool.</p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
    function openPopup() {
        document.getElementById("popup").classList.add("active");

        // 🔧 CUSTOMIZE HERE
        document.getElementById("popupTitle").innerText = "Welcome!";
        document.getElementById("popupMessage").innerText = "You can change this text in the code easily.";
    }

    function closePopup() {
        document.getElementById("popup").classList.remove("active");
    }
</script>

</body>
</html>
