<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heidee</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #fff;
    text-align: center;
}

/* HEADER */
header {
    padding: 80px 20px;
}

h1 {
    font-size: 60px;
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(255,255,255,0.7);
}

.subtitle {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.9;
}

/* CARD SECTION */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding: 40px;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    width: 250px;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 30px rgba(255,255,255,0.5);
}

.card h2 {
    font-size: 22px;
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff6b81;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ff6b81;
    color: white;
    box-shadow: 0 0 15px #ff6b81;
}

/* FOOTER */
footer {
    margin-top: 50px;
    padding: 20px;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<header>
    <h1>Heidee ✨</h1>
    <p class="subtitle">A soft place where smiles, memories, and love stay forever 💗</p>
    <button class="btn">You make everything beautiful</button>
</header>

<div class="container">

    <div class="card">
        <h2>🌸 Smile</h2>
        <p>Your smile is literally my favorite thing in the world.</p>
    </div>

    <div class="card">
        <h2>💫 Vibes</h2>
        <p>Being with you feels calm, soft, and safe—like home.</p>
    </div>

    <div class="card">
        <h2>💖 Special</h2>
        <p>Out of everyone, you're the one I’d always choose.</p>
    </div>

</div>

<footer>
    Made with 💗 just for Heidee
</footer>

</body>
</html>
